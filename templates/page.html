<article class="wiki-page">
  <header class="page-header">
    <span class="type-badge type-{{type}}">{{type_label}}</span>
    <h1>{{title}}</h1>
    <div class="page-meta">
      <span>建立：{{created}}</span>
      <span>更新：{{updated}}</span>
    </div>
    <div class="page-tags">
      {{tags_html}}
    </div>
  </header>

  <div class="page-body">
    {{body}}
  </div>

  {{backlinks_section}}

  {{sources_section}}
</article>
